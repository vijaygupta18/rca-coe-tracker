# =============================================================================
# RCA COE Tracker — production manifests.
#
# Resources:
#   1. PersistentVolumeClaim   rca-coe-pgdata        (10Gi)
#   2. Secret                  rca-coe-db-secret     (Postgres creds)
#   3. StatefulSet             rca-coe-db            (postgres:16-alpine)
#   4. Service                 rca-coe-db            (ClusterIP :5432)
#   5. ConfigMap               rca-coe-config        (app non-secrets)
#   6. Secret                  rca-coe-secrets       (app secrets)
#   7. Deployment              rca-coe-tracker       (FastAPI + SPA)
#   8. Service                 rca-coe-tracker       (ClusterIP :8000)
#
# Auth is fronted by an upstream identity proxy (Pomerium / oauth2-proxy /
# similar). The app trusts forwarded claims:
#   x-pomerium-claim-email, x-pomerium-claim-name
#
# Before applying:
#   - Replace `your-namespace` everywhere with your target k8s namespace.
#   - Replace `<your-registry>/rca-coe-tracker:<tag>` with your image ref.
#   - Replace APP_BASE_URL / CORS_ORIGINS with your real public URL.
#   - Set ADMIN_EMAILS to the seed admin emails.
#   - Fill in the four placeholder secrets in step 6.
# =============================================================================

---
# 1. PVC for Postgres data ----------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rca-coe-pgdata
  namespace: your-namespace
  labels:
    app: rca-coe-db
spec:
  accessModes:
    - ReadWriteOnce
  # storageClassName omitted -> cluster default. Pin if you need a specific class.
  resources:
    requests:
      storage: 10Gi

---
# 2. Postgres bootstrap secret -----------------------------------------------
# FIXME(rotate): the password below is a placeholder. Set a real one before
# anything sensitive lands in this DB. To rotate later:
#   1. kubectl edit secret rca-coe-db-secret -n your-namespace
#   2. exec into rca-coe-db-0 and ALTER USER rca WITH PASSWORD '<new>';
#   3. update DATABASE_URL in rca-coe-secrets to match
apiVersion: v1
kind: Secret
metadata:
  name: rca-coe-db-secret
  namespace: your-namespace
type: Opaque
stringData:
  POSTGRES_USER: "rca"
  POSTGRES_PASSWORD: "changeme-rotate-me"
  POSTGRES_DB: "rca_coe"

---
# 3. Postgres StatefulSet -----------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rca-coe-db
  namespace: your-namespace
  labels:
    app: rca-coe-db
spec:
  serviceName: rca-coe-db
  replicas: 1
  selector:
    matchLabels:
      app: rca-coe-db
  template:
    metadata:
      labels:
        app: rca-coe-db
    spec:
      # Pin the DB to on-demand nodes if your cluster has spot/preemptible
      # nodes — eviction would interrupt writes. Add a nodeSelector here if
      # needed.
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: rca-coe-db-secret
          env:
            # subPath means PGDATA must point at a child dir, not the mount root.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "rca", "-d", "rca_coe"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "rca", "-d", "rca_coe"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: rca-coe-pgdata

---
# 4. Postgres Service ---------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: rca-coe-db
  namespace: your-namespace
  labels:
    app: rca-coe-db
spec:
  type: ClusterIP
  selector:
    app: rca-coe-db
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres

---
# 5. App ConfigMap ------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: rca-coe-config
  namespace: your-namespace
data:
  # Public URL the identity proxy serves the app on.
  APP_BASE_URL: "https://rca-coe.example.com"
  CORS_ORIGINS: "https://rca-coe.example.com"
  # DB (must match rca-coe-db-secret + DATABASE_URL in rca-coe-secrets)
  DB_SCHEMA: "rca_coe"
  DB_USER: "rca"
  DB_NAME: "rca_coe"
  # Comma-separated seed admin emails. Cannot be demoted from the UI.
  ADMIN_EMAILS: "admin@example.com"
  # AI summary on RCA closure (optional). Use a non-reasoning model.
  AI_PROVIDER: "openai"
  AI_MODEL: "gpt-4o"
  AI_FAST_MODEL: "gpt-4o-mini"
  AI_API_BASE: ""
  AI_MAX_TOKENS: "2000"
  AI_TEMPERATURE: "0.2"

---
# 6. App Secret ---------------------------------------------------------------
# FIXME: the four values below are placeholders. Fill them in before applying.
# This file is gitignored — DO NOT commit a populated copy.
apiVersion: v1
kind: Secret
metadata:
  name: rca-coe-secrets
  namespace: your-namespace
type: Opaque
stringData:
  # Must match rca-coe-db-secret.
  DATABASE_URL: "postgresql+asyncpg://rca:changeme-rotate-me@rca-coe-db:5432/rca_coe"
  # Slack bot token with scopes: chat:write, im:write, users:read.email
  SLACK_BOT_TOKEN: ""
  SLACK_SIGNING_SECRET: ""
  # OpenAI-compatible API key for AI summary generation.
  AI_API_KEY: ""

---
# 7. App Deployment -----------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-coe-tracker
  namespace: your-namespace
  labels:
    app: rca-coe-tracker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rca-coe-tracker
  template:
    metadata:
      labels:
        app: rca-coe-tracker
    spec:
      containers:
        - name: rca-coe-tracker
          image: <your-registry>/rca-coe-tracker:0.1.0
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: rca-coe-config
            - secretRef:
                name: rca-coe-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

---
# 8. App Service --------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: rca-coe-tracker
  namespace: your-namespace
  labels:
    app: rca-coe-tracker
spec:
  type: ClusterIP
  selector:
    app: rca-coe-tracker
  ports:
    - port: 8000
      targetPort: 8000
      name: http
